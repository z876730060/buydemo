version: "3.8"

services:
  buydemo:
    build: .
    container_name: buydemo-erp
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DB_PATH=/app/data/buydemo.db
      - SERVER_PORT=:8080
      - JWT_SECRET=buy-demo-secret-key-change-in-production
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
    restart: unless-stopped
